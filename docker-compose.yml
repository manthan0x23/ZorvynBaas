services:
  postgres:
    image: postgres:17
    container_name: zorvyn-postgres
    restart: always
    environment:
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=zorvyn_baas
    ports:
      - "5438:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./src/db/postgres/scripts/001_initialization.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d zorvyn_baas"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: zorvyn-server
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://root:password@postgres:5432/zorvyn_baas
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    command: >
      sh -c "
        pnpm db:migrate:prod &&
        pnpm db:seed:prod &&
        pnpm start
      "

volumes:
  postgres-data: